# ─── Datasource ────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/anomaly_db}
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# ─── JWT ───────────────────────────────────────────────────────────────────────
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=anomaly-detector
quarkus.smallrye-jwt.enabled=true

# ─── REST Client → AI Service ──────────────────────────────────────────────────
quarkus.rest-client.ai-service.url=${AI_SERVICE_URL:http://localhost:8081}
quarkus.rest-client.ai-service.connect-timeout=3000
quarkus.rest-client.ai-service.read-timeout=8000

# ─── CORS (para pruebas locales) ───────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type

# ─── Jackson ───────────────────────────────────────────────────────────────────
quarkus.jackson.serialization-inclusion=non-null
quarkus.jackson.write-dates-as-timestamps=false

# ─── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.category."com.security".level=DEBUG

# ─── Dev mode ──────────────────────────────────────────────────────────────────
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=false
