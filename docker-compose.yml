version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: anomaly-postgres
    environment:
      POSTGRES_DB: anomaly_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: anomaly-ai-service
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  quarkus-backend:
    build:
      context: ./quarkus-backend
      dockerfile: Dockerfile
    container_name: anomaly-backend
    ports:
      - "8080:8080"
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_URL: jdbc:postgresql://postgres:5432/anomaly_db
      AI_SERVICE_URL: http://ai-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy

volumes:
  postgres_data:
